<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="112" y1="44" x2="1156" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FFFB"/>
      <stop offset="1" stop-color="#E7FFF8"/>
    </linearGradient>
    <filter id="shadow3" x="0" y="0" width="1280" height="800" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0F766E" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1280" height="800" rx="40" fill="url(#bg3)"/>
  <circle cx="116" cy="136" r="76" fill="#CFFBF0"/>
  <circle cx="1118" cy="654" r="132" fill="#D7FFF3"/>

  <rect x="74" y="88" width="484" height="620" rx="36" fill="#FFFFFF" filter="url(#shadow3)"/>
  <text x="134" y="184" fill="#0F766E" font-size="20" font-family="Arial" font-weight="700">Safe and simple</text>
  <text x="134" y="252" fill="#111827" font-size="58" font-family="Arial" font-weight="700">Keep your settings,</text>
  <text x="134" y="320" fill="#111827" font-size="58" font-family="Arial" font-weight="700">not your data</text>
  <text x="134" y="388" fill="#6B7280" font-size="28" font-family="Arial">The extension stores only local preferences</text>
  <text x="134" y="428" fill="#6B7280" font-size="28" font-family="Arial">like your shortcut and sidebar toggle.</text>

  <rect x="134" y="504" width="340" height="58" rx="18" fill="#E6FFF7"/>
  <text x="160" y="541" fill="#0F766E" font-size="21" font-family="Arial" font-weight="700">Only uses storage permission</text>

  <rect x="134" y="586" width="286" height="52" rx="18" fill="#F2FDF9"/>
  <text x="160" y="619" fill="#0F766E" font-size="20" font-family="Arial" font-weight="700">No analytics or tracking</text>

  <rect x="612" y="118" width="592" height="554" rx="36" fill="#0B1F1D" filter="url(#shadow3)"/>
  <text x="652" y="174" fill="#99F6E4" font-size="20" font-family="Arial" font-weight="700">Privacy snapshot</text>

  <rect x="652" y="214" width="512" height="114" rx="24" fill="#102927" stroke="#1F4441"/>
  <text x="684" y="258" fill="#F8FAFC" font-size="26" font-family="Arial" font-weight="700">What this extension stores</text>
  <text x="684" y="294" fill="#A7F3D0" font-size="18" font-family="Arial">Custom shortcut settings and UI preferences only.</text>

  <rect x="652" y="350" width="512" height="114" rx="24" fill="#102927" stroke="#1F4441"/>
  <text x="684" y="394" fill="#F8FAFC" font-size="26" font-family="Arial" font-weight="700">What it does not collect</text>
  <text x="684" y="430" fill="#A7F3D0" font-size="18" font-family="Arial">No chat content, no analytics, no sale of personal data.</text>

  <rect x="652" y="486" width="512" height="114" rx="24" fill="#102927" stroke="#1F4441"/>
  <text x="684" y="530" fill="#F8FAFC" font-size="26" font-family="Arial" font-weight="700">Permissions</text>
  <text x="684" y="566" fill="#A7F3D0" font-size="18" font-family="Arial">Runs on Gemini and uses storage to save your settings.</text>
</svg>
